# QLoRA fine-tuning configuration for training/train.py and training/resume.py.

base_model: Qwen/Qwen3-8B
tokenizer: Qwen/Qwen3-8B
trust_remote_code: false

quantization:
  load_in_4bit: true
  bnb_4bit_quant_type: nf4
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

training:
  output_dir: outputs/qwen3-8b-canvas-ai
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_seq_length: 4096
  logging_steps: 10
  eval_strategy: steps
  eval_steps: 100
  save_strategy: steps
  save_steps: 100
  save_total_limit: 3
  bf16: true
  gradient_checkpointing: true
  seed: 42
  report_to: tensorboard

data:
  train_path: datasets/train/train.jsonl
  validation_path: datasets/validation/validation.jsonl
