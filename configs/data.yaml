# Dataset generation / split configuration for preprocessing/*.py.

# The IntentAction set from the main app's app/mcp-server/src/schemas/intent.py,
# plus post_announcement (confirmed via a real app/backend/action_history
# export as a real action type not yet reflected in the intent.py this repo
# was shown) — 19 values total, including "unsupported". generate_synthetic_data.py
# seeds one generation pass per action so the training set stays balanced
# across all of them. Matches prompts/system.txt's "Supported actions" list
# exactly — keep these two in sync if the main app's enum changes.
workflows:
  - id: list_courses
    description: Listing the instructor's courses.
  - id: list_students
    description: Listing students in a course.
  - id: list_assignments
    description: Listing assignments in a course.
  - id: list_submissions
    description: Listing submissions for an assignment.
  - id: list_messages
    description: Listing/searching Canvas inbox conversations.
  - id: class_statistics
    description: Count/statistics questions about a class or assignment.
  - id: create_assignment
    description: Creating assignments, with generated description and rubric.
  - id: update_assignment_dates
    description: Updating assignment due/unlock/lock dates, absolute or relative shift.
  - id: delete_assignment
    description: Deleting one named assignment.
  - id: publish_assignment
    description: Publishing (making visible) one named assignment.
  - id: unpublish_assignment
    description: Unpublishing (hiding) one named assignment.
  - id: post_announcement
    description: Posting a course-wide announcement.
  - id: draft_message
    description: Drafting a new message to a student or a status-defined group.
  - id: draft_feedback
    description: Drafting a feedback comment on a submission.
  - id: reply_to_message
    description: Replying to an existing Canvas conversation.
  - id: create_quiz
    description: Creating quizzes, with generated questions.
  - id: update_quiz_question
    description: Editing a specific existing question on an existing quiz.
  - id: modify_grade
    description: Modifying a grade for a student or a status-defined group.
  - id: unsupported
    description: Out-of-scope requests -- autonomous/scheduled execution, bulk or unrestricted deletion, institution-wide admin actions, raw Canvas API access, or anything outside the 18 supported actions above.

synthetic_generation:
  examples_per_workflow: 100
  teacher_provider: openai # anthropic | openai
  teacher_model: gpt-5-mini
  temperature: 0.9
  output_path: datasets/raw/synthetic_examples.jsonl

split:
  seed: 42
  train_ratio: 0.8
  validation_ratio: 0.1
  test_ratio: 0.1
  stratify_by: workflow_id
  input_path: datasets/processed/chatml/examples.jsonl
  train_path: datasets/train/train.jsonl
  validation_path: datasets/validation/validation.jsonl
  test_path: datasets/test/test.jsonl
